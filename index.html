<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>風呂キャン・ハザード</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body{background:#03060a;color:#00ffcc;font-family:'Share Tech Mono',sans-serif;margin:0;}
        .tab-content{padding:20px;}
        .area-item{display:flex;justify-content:space-between;padding:15px;border-bottom:1px solid #1e293b;font-size:18px;}
        .danger{color:#ef4444;font-weight:bold;}
        .rank-list{margin-top:20px;}
        .report-btn{width:200px;height:200px;border-radius:50%;background:#03060a;border:5px solid #00ffcc;color:#00ffcc;font-size:20px;cursor:pointer;margin:20px auto;display:block;}
    </style>
</head>
<body>
    <div id="app">
        <div id="control-tab">
            <button class="report-btn" onclick="openReport()">REPORT</button>
        </div>
        <div id="monitor-tab" class="rank-list"></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://furocan-hazard-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const fbDB = firebase.database();

        const prefs = ["hokkaido", "tokyo", "okayama", "osaka"]; // 全47都道府県分をここに追加
        
        function updateData() {
            let list = [];
            prefs.forEach(id => {
                fbDB.ref('areas/' + id).on('value', (s) => {
                    const data = s.val() || { active_cancels: 0, total_soldiers: 0 };
                    const rate = data.total_soldiers > 0 ? (data.active_cancels / data.total_soldiers) * 100 : 0;
                    list.push({ id, ...data, rate });
                    render(list.sort((a,b) => b.rate - a.rate));
                });
            });
        }

        function render(list) {
            document.getElementById('monitor-tab').innerHTML = list.map(p => `
                <div class="area-item ${p.rate > 30 ? 'danger' : ''}">
                    ${p.id.toUpperCase()} <span>${p.rate.toFixed(1)}% (${p.active_cancels}/${p.total_soldiers})</span>
                </div>
            `).join('');
        }

        function openReport() {
            const status = prompt("入浴済なら'1', 風呂キャンなら'2'を入力");
            const myPref = localStorage.getItem('furo_pref_id') || "tokyo";
            if(status === '2') {
                fbDB.ref('areas/' + myPref + '/active_cancels').transaction(c => (c || 0) + 1);
                fbDB.ref('global/total_active_cancels').transaction(c => (c || 0) + 1);
            } else if(status === '1') {
                fbDB.ref('areas/' + myPref + '/active_cancels').transaction(c => Math.max(0, (c || 0) - 1));
                fbDB.ref('global/total_active_cancels').transaction(c => Math.max(0, (c || 0) - 1));
            }
        }

        updateData();
    </script>
</body>
</html>
