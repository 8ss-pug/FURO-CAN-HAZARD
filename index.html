<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>風呂キャン・ハザード</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { background: #03060a; color: #00ffcc; font-family: sans-serif; margin: 0; padding: 20px; font-size: 18px; }
        .area-item { display: flex; justify-content: space-between; padding: 20px; border-bottom: 1px solid #333; font-size: 22px; }
        .danger { color: #ff4444; font-weight: bold; }
        .report-btn { width: 100%; padding: 30px; background: #00ffcc; color: #000; font-size: 24px; font-weight: bold; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <button class="report-btn" onclick="openReport()">風呂キャン報告</button>
    <div id="monitor-tab"></div>

    <script>
        const firebaseConfig = { databaseURL: "https://furocan-hazard-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const fbDB = firebase.database();
        const prefs = ["hokkaido", "tokyo", "okayama", "osaka"];

        function openReport() {
            const status = prompt("入浴済なら'1', 風呂キャンなら'2'を入力");
            const myPref = localStorage.getItem('furo_pref_id') || "tokyo";
            if(status === '2') {
                fbDB.ref('areas/' + myPref + '/active_cancels').transaction(c => (c || 0) + 1);
                fbDB.ref('global/total_active_cancels').transaction(c => (c || 0) + 1);
            } else if(status === '1') {
                fbDB.ref('areas/' + myPref + '/active_cancels').transaction(c => Math.max(0, (c || 0) - 1));
                fbDB.ref('global/total_active_cancels').transaction(c => Math.max(0, (c || 0) - 1));
            }
        }

        // 全都道府県を監視して合算集計を表示
        prefs.forEach(id => {
            fbDB.ref('areas/' + id).on('value', (s) => {
                const data = s.val() || { active_cancels: 0, total_soldiers: 1 };
                const rate = data.total_soldiers > 0 ? (data.active_cancels / data.total_soldiers) * 100 : 0;
                let el = document.getElementById(id);
                if (!el) {
                    el = document.createElement('div'); el.id = id; el.className = 'area-item';
                    document.getElementById('monitor-tab').appendChild(el);
                }
                el.innerHTML = `<span>${id.toUpperCase()}</span> <span class="${rate > 30 ? 'danger' : ''}">${rate.toFixed(1)}% (${data.active_cancels}人)</span>`;
            });
        });
    </script>
</body>
</html>
